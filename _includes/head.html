<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Titre du site -->
  <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>

  <!-- Description -->
  <meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">

  <!-- Favicon -->
  <link rel="shortcut icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Academicons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.5/css/academicons.min.css">

  <!-- Bootstrap (si utilisé par le thème) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- CSS principal du thème -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- ==========================================================
       GOOGLE SEARCH CONSOLE VERIFICATION
       Colle ta balise méta ici
       ========================================================== -->
  <meta name="google-site-verification" content="E1N-Iv8LJP5-YHBXTcajAgMzekTX6D_UjbenWz3NPP4" />
  <!-- ==========================================================
       FIN DE LA ZONE DE VÉRIFICATION
       ========================================================== -->

  <!-- Scripts optionnels (ex: MathJax, etc.) -->
  {% if site.enable_math %}
    <script>
      MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
        svg: { fontCache: 'global' }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  {% endif %}

  <!-- Autres inclusions -->
  {% if site.google_analytics %}
    {% include google-analytics.html %}
  {% endif %}

  <!-- Jekyll SEO (si utilisé) -->
  {% seo %}

  {% if page.noindex %}
  <meta name="robots" content="noindex">
  {% endif %}
</head>
